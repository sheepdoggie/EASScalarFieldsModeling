name: Verify release manifest

on:
  push:
    paths:
      - 'releases/current/**'
      - 'tools/**'
      - '.github/workflows/verify-release-manifest.yml'
  pull_request:
    paths:
      - 'releases/current/**'
      - 'tools/**'
      - '.github/workflows/verify-release-manifest.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install cryptography
      - name: Verify manifest signature if signature/public key are present
        run: |
          if [ -f releases/current/FRAMEWORK_RELEASE_MANIFEST.sig ] && [ -f releases/current/FRAMEWORK_RELEASE_PUBLIC_KEY.pem ]; then
            python tools/verify_release_manifest.py \
              releases/current/FRAMEWORK_RELEASE_MANIFEST.json \
              releases/current/FRAMEWORK_RELEASE_MANIFEST.sig \
              releases/current/FRAMEWORK_RELEASE_PUBLIC_KEY.pem \
              releases/current/enforceable_rank3_modeling.zip
          else
            echo "Signature/public key not present yet. Generate them before enforcing release guard."
          fi
      - name: Check required capability files in framework ZIP
        run: |
          python tools/check_framework_zip_capabilities.py \
            releases/current/FRAMEWORK_RELEASE_MANIFEST.json \
            releases/current/enforceable_rank3_modeling.zip
